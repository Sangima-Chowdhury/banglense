<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BangLense — your letter explained</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="page">

    <nav class="nav">
      <div class="brand">
        <div class="logo-tile">
          <svg width="22" height="22" viewBox="0 0 58 58">
            <circle cx="29" cy="29" r="27" fill="none" stroke="#3f6b58" stroke-width="3.5"/>
            <circle cx="29" cy="29" r="12" fill="#c98379"/>
          </svg>
        </div>
        <span class="brand-name">BangLense</span>
      </div>
      <div class="nav-links">
        <a href="{{ url_for('index') }}">scan another</a>
      </div>
    </nav>

    <div class="result-wrap">
      <div class="result-card">

        {% if filename %}
        <div class="file-chip">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="#c98379" stroke-width="2">
            <path d="M14 3H6v18h12V8z"/>
            <path d="M14 3v5h5"/>
          </svg>
          {{ filename }}
        </div>
        {% endif %}

        <div class="section-label">EXPLANATION</div>
        <p class="section-text bangla-text">{{ explanation }}</p>

        {% if what_to_do %}
        <div class="section-label">WHAT TO DO</div>
        <p class="section-text bangla-text">{{ what_to_do }}</p>
        {% endif %}

        <button class="listen-button" type="button" id="listen-btn">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M11 5 6 9H2v6h4l5 4z"/>
            <path d="M15.5 8.5a5 5 0 0 1 0 7"/>
          </svg>
          <span id="listen-label">Listen in Bangla</span>
        </button>

      </div>

      <a class="back-link" href="{{ url_for('index') }}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Scan another letter
      </a>
    </div>

  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
